name: Build and deploy static site

on:
  push:
    branches: [main]
    paths:
      - 'app_publish/www/graph.json'
      - 'app_publish/www/descriptions.json'
      - 'app_publish/www/render.js'
      - 'app_publish/www/style.css'
      - 'shared/layout.R'
      - 'tools/build_static.R'
      - 'site/index.html'
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Install R packages
        run: Rscript -e "install.packages(c('jsonlite', 'here'), repos = 'https://cloud.r-project.org')"

      - name: Build static site
        run: Rscript tools/build_static.R

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
